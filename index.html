<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Feedback Prototype</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Guide Overlay -->
<div id="guideOverlay">
    <div class="guideContent">
        <h2>How to use</h2>
        <p>
            • Click small buttons to preview feedback effects<br>
            • Drag buttons into the center area<br>
            • Effects will combine on the main button<br><br>
            Click anywhere to begin
        </p>
    </div>
</div>

<div class="container">

    <!-- Main Button -->
    <button id="mainButton">DROP EFFECTS HERE</button>


    <!-- Small Feedback Buttons -->

    <button class="small-btn"
        draggable="true"
        data-effect="shake">
        Shake
    </button>

    <button class="small-btn"
        draggable="true"
        data-effect="scale">
        Scale
    </button>

    <button class="small-btn"
        draggable="true"
        data-effect="rotate">
        Rotate
    </button>

    <button class="small-btn"
        draggable="true"
        data-effect="glow">
        Glow
    </button>

    <button class="small-btn"
        draggable="true"
        data-effect="color">
        Color
    </button>
</div>

<script src="main.js"></script>

</body>
</html>
