<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Prototype</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Add tick box back to unselect the feedback choices, and for better user accessbility -->
<!-- Add a output css section, so the user could take the css code after they have tested a feedback combination they like -->
<!-- Add slide bar to allow users to adjust the strength of feedback effect -->
<!-- Add a sound feedback (?) -> No keep the effects visual, for better user experence and also css output. -->
<!-- Add colour pallet for the colour feedback effect -->
<!-- Need a new visual effect (wave?), also it need to have the space for user to adjust the strength -->
<!-- Upscale the buttons -->

<!-- guide button -->
<button id="guideButton">?</button>

<!-- popup -->
<div id="guidePopup" class="hidden">
    <div class="popupContent">
        <h2>How to use</h2>
        <p>
            Click small buttons to preview feedback effects.<br><br>
            Drag small buttons onto the center button<br>
            to add their effects.
        </p>
        <p>Click the center button to activate</p>

        <button id="closeGuide">Close</button>
    </div>
</div>

<div class="container">
    <!-- center button -->
    <button id="mainButton">
        DROP EFFECT HERE
    </button>

    <!-- small buttons -->
    <div class="control">
        <button class="small-btn"
            draggable="true"
            data-effect="shake">
            Shake
        </button>
    </div>

    <div class="control">
        <button class="small-btn"
            draggable="true"
            data-effect="scale">
            Scale
        </button>
    </div>

    <div class="control">
        <button class="small-btn"
            draggable="true"
            data-effect="rotate">
            Rotate
        </button>
    </div>

    <div class="control">
        <button class="small-btn"
            draggable="true"
            data-effect="glow">
            Glow
        </button>
    </div>

    <div class="control">
        <button class="small-btn"
            draggable="true"
            data-effect="color">
            Color
        </button>
    </div>

</div>

<script src="main.js"></script>

</body>
</html>
