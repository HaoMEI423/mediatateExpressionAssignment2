<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Feedback Prototype</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="guideOverlay">
    <div class="guideContent">
        <h2>How to use</h2>
        <p>
            • Small buttons show different feedback effects<br>
            • Tick the boxes to select effects<br>
            • Press the center button to combine them<br><br>
        </p>
    </div>
    </div>

    <div class="container">

    <button id="mainButton">Click</button>

    <div class="control">
        <label><input type="checkbox" data-effect="shake"> Shake</label><br>
        <button class="small-btn" data-effect="shake">Shake</button>
    </div>

    <div class="control">
        <label><input type="checkbox" data-effect="scale"> Scale</label><br>
        <button class="small-btn" data-effect="scale">Scale</button>
    </div>

    <div class="control">
        <label><input type="checkbox" data-effect="rotate"> Rotate</label><br>
        <button class="small-btn" data-effect="rotate">Rotate</button>
    </div>

    <div class="control">
        <label><input type="checkbox" data-effect="glow"> Glow</label><br>
        <button class="small-btn" data-effect="glow">Glow</button>
    </div>

    <div class="control">
        <label><input type="checkbox" data-effect="color"> Colour</label><br>
        <button class="small-btn" data-effect="color">Colour</button>
    </div>

    </div>

<script src="main.js"></script>

</body>
</html>
